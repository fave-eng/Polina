<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Putting Your Words to Work — Vocabulary</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #4f46e5; --indigo-light: #6366f1;
      --rose: #f43f5e; --emerald: #10b981;
      --amber: #f59e0b; --violet: #8b5cf6;
      --sky: #0ea5e9;
      --bg: #f1f5f9; --card: #ffffff;
      --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:110px; }

    /* HERO */
    .hero { background:linear-gradient(135deg,#0ea5e9 0%,#6366f1 60%,#8b5cf6 100%); padding:36px 24px 48px; position:relative; }
    .hero::before { content:''; position:absolute; inset:0; pointer-events:none; background:url("data:image/svg+xml,%3Csvg width='48' height='48' viewBox='0 0 48 48' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='24' cy='24' r='3' fill='%23ffffff' fill-opacity='0.07'/%3E%3C/svg%3E"); }
    .hero-wave { display:block; width:100%; line-height:0; background:var(--bg); }
    .hero-wave svg { display:block; width:100%; }
    .hero-back { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,.75); font-size:13px; font-weight:600; text-decoration:none; margin-bottom:18px; transition:color .2s; position:relative; z-index:1; }
    .hero-back:hover { color:#fff; }
    .hero-badge { display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.28); color:#fff; font-size:12px; font-weight:600; padding:5px 14px; border-radius:100px; margin-bottom:12px; position:relative; z-index:1; }
    .hero h1 { font-family:'Plus Jakarta Sans',sans-serif; font-size:clamp(22px,5vw,36px); font-weight:800; color:#fff; letter-spacing:-.5px; margin-bottom:6px; position:relative; z-index:1; }
    .hero p { color:rgba(255,255,255,.75); font-size:14px; position:relative; z-index:1; }
    .hero-prog-row { display:flex; align-items:center; gap:14px; margin-top:18px; position:relative; z-index:1; }
    .hero-prog-bg { flex:1; height:7px; background:rgba(255,255,255,.25); border-radius:100px; overflow:hidden; max-width:280px; }
    .hero-prog-fill { height:100%; background:#fff; border-radius:100px; transition:width .6s ease; }
    .hero-prog-label { color:rgba(255,255,255,.9); font-size:13px; font-weight:700; white-space:nowrap; }

    .page { max-width:680px; margin:0 auto; padding:0 20px; }

    /* MODE TABS */
    .mode-tabs { display:flex; gap:8px; margin:24px 0 20px; }
    .mode-tab { flex:1; text-align:center; background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:11px 8px; cursor:pointer; transition:all .18s; }
    .mode-tab .mt-icon { font-size:18px; margin-bottom:3px; }
    .mode-tab .mt-label { font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; color:var(--muted); }
    .mode-tab.active { border-color:var(--indigo); background:#eef2ff; box-shadow:0 4px 16px rgba(99,102,241,.12); }
    .mode-tab.active .mt-label { color:var(--indigo); }

    /* COUNTER */
    .card-counter { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .cc-pos { font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; }
    .learned-badge { display:inline-flex; align-items:center; gap:5px; background:#d1fae5; color:#065f46; font-size:12px; font-weight:700; padding:4px 12px; border-radius:100px; }
    .not-learned-badge { display:inline-flex; align-items:center; gap:5px; background:#f1f5f9; color:var(--muted); font-size:12px; font-weight:700; padding:4px 12px; border-radius:100px; }

    /* FLASHCARD */
    .flashcard { background:var(--card); border-radius:24px; border:1.5px solid var(--border); overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.06); margin-bottom:18px; }
    .fc-image { width:100%; height:170px; display:flex; align-items:center; justify-content:center; font-size:76px; user-select:none; }
    .fc-body { padding:20px 22px 20px; }
    .fc-word-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
    .fc-word { font-family:'Plus Jakarta Sans',sans-serif; font-size:24px; font-weight:800; color:var(--text); line-height:1.2; }
    .fc-tag { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; padding:4px 12px; border-radius:100px; white-space:nowrap; margin-top:4px; background:#eef2ff; color:var(--indigo); }
    .fc-translation-box { background:#f0fdf4; border:1.5px solid #6ee7b7; border-radius:12px; padding:14px 16px; font-weight:700; font-size:16px; color:#065f46; text-align:center; margin-bottom:12px; }
    .fc-example { font-style:italic; font-size:13px; color:var(--muted); background:#f8fafc; padding:11px 13px; border-radius:10px; line-height:1.6; border-left:3px solid #e2e8f0; margin-bottom:12px; }
    .fc-hint { font-size:12px; color:#78350f; background:#fefce8; border-radius:8px; padding:8px 12px; line-height:1.5; margin-bottom:14px; }

    /* BUTTONS */
    .know-row { display:flex; gap:10px; margin-bottom:10px; }
    .btn-know { flex:1; padding:12px; border:2px solid #bbf7d0; border-radius:13px; background:#f0fdf4; color:#065f46; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .18s; }
    .btn-know:hover { background:#dcfce7; }
    .btn-dontknow { flex:1; padding:12px; border:2px solid #fecaca; border-radius:13px; background:#fff5f5; color:#991b1b; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .18s; }
    .btn-dontknow:hover { background:#fee2e2; }
    .btn-row { display:flex; gap:10px; }
    .btn { flex:1; padding:12px; border:none; border-radius:13px; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .18s; }
    .btn:active { transform:scale(.97); }
    .btn-prev { background:#f1f5f9; color:var(--muted); flex:0 0 50px; font-size:16px; }
    .btn-prev:hover { background:#e2e8f0; }
    .btn-prev:disabled { opacity:.3; cursor:default; }
    .btn-next { background:#0f172a; color:#fff; }
    .btn-next:hover { background:#1e293b; }

    /* TEST */
    .test-input { width:100%; padding:13px 14px; font-size:15px; font-family:inherit; border:2px solid var(--border); border-radius:13px; background:#fafbff; color:var(--text); transition:border-color .2s; margin-bottom:10px; }
    .test-input:focus { outline:none; border-color:var(--indigo); background:#fff; }
    .test-input.correct { border-color:var(--emerald); background:#f0fdf4; }
    .test-input.wrong { border-color:var(--rose); background:#fff5f5; }
    .test-feedback { font-size:14px; font-weight:600; padding:10px 14px; border-radius:10px; margin-bottom:10px; display:none; }
    .test-feedback.correct { background:#d1fae5; color:#065f46; display:block; }
    .test-feedback.wrong { background:#ffe4e6; color:#9f1239; display:block; }
    .btn-check { width:100%; padding:14px; background:linear-gradient(135deg,var(--indigo),var(--violet)); color:#fff; border:none; border-radius:13px; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:10px; transition:opacity .2s; }
    .btn-check:hover { opacity:.9; }

    /* FINISH */
    .finish-screen { display:none; text-align:center; background:var(--card); border-radius:24px; border:1.5px solid var(--border); padding:40px 24px; }
    .finish-screen .fs-emoji { font-size:64px; margin-bottom:16px; }
    .finish-screen h2 { font-family:'Plus Jakarta Sans',sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; }
    .finish-screen p { font-size:15px; color:var(--muted); margin-bottom:24px; }
    .finish-stats { display:flex; gap:12px; justify-content:center; margin-bottom:28px; flex-wrap:wrap; }
    .fstat { background:var(--bg); border-radius:14px; padding:14px 20px; min-width:90px; }
    .fstat .fn { font-family:'Plus Jakarta Sans',sans-serif; font-size:26px; font-weight:800; }
    .fstat .fl { font-size:11px; color:var(--muted); font-weight:600; }
    .btn-restart { background:linear-gradient(135deg,var(--indigo),var(--violet)); color:#fff; border:none; border-radius:14px; padding:14px 32px; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }

    /* NAV */
    .nav-pill { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#0f172a; border-radius:100px; padding:12px 24px; display:flex; gap:4px; box-shadow:0 8px 32px rgba(15,23,42,.3); z-index:900; white-space:nowrap; }
    .nav-pill a { color:rgba(255,255,255,.6); font-size:12px; font-weight:600; text-decoration:none; padding:6px 14px; border-radius:100px; transition:all .2s; }
    .nav-pill a:hover, .nav-pill a.active { background:var(--indigo); color:#fff; }
  </style>
</head>
<body>

<div class="hero">
  <div class="page">
    <a href="./vocabulary-hub.html" class="hero-back">← Vocabulary Hub</a>
    <div class="hero-badge">🗣️ Unit 1 · Putting Your Words to Work</div>
    <h1>Language Classes Vocabulary</h1>
    <p>Слова и выражения из историй про языковые курсы — учи с карточками</p>
    <div class="hero-prog-row">
      <div class="hero-prog-bg"><div class="hero-prog-fill" id="heroProgFill" style="width:0%"></div></div>
      <div class="hero-prog-label" id="heroProgLabel">0 / 20 выучено</div>
    </div>
  </div>
</div>
<div class="hero-wave">
  <svg viewBox="0 0 1440 56" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="background:linear-gradient(135deg,#0ea5e9,#6366f1 60%,#8b5cf6)">
    <path d="M0,56 C360,0 1080,0 1440,56 L1440,56 L0,56 Z" fill="#f1f5f9"/>
  </svg>
</div>

<div class="page">

  <div class="mode-tabs">
    <div class="mode-tab active" id="tab-learn" onclick="setMode('learn')"><div class="mt-icon">📖</div><div class="mt-label">Учить</div></div>
    <div class="mode-tab" id="tab-test"  onclick="setMode('test')"> <div class="mt-icon">✏️</div><div class="mt-label">Тест</div></div>
    <div class="mode-tab" id="tab-hard"  onclick="setMode('hard')"> <div class="mt-icon">🔁</div><div class="mt-label">Сложные</div></div>
  </div>

  <div class="card-counter" id="cardCounter">
    <div class="cc-pos" id="ccPos">1 / 20</div>
    <div id="learnedBadge" class="not-learned-badge">○ Не выучено</div>
  </div>

  <div class="flashcard" id="flashcard">
    <div class="fc-image" id="fcImage"></div>
    <div class="fc-body">
      <div class="fc-word-row">
        <div class="fc-word" id="fcWord"></div>
        <div class="fc-tag"  id="fcTag"></div>
      </div>

      <!-- LEARN -->
      <div id="learnZone">
        <div class="fc-translation-box" id="fcTranslation"></div>
        <div class="fc-example" id="fcExample"></div>
        <div class="fc-hint"    id="fcHint"></div>
        <div class="know-row">
          <button class="btn-dontknow" onclick="markCard(false)">✗ Не знаю</button>
          <button class="btn-know"     onclick="markCard(true)">✓ Знаю!</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-prev" id="prevBtn" onclick="changeCard(-1)" disabled>←</button>
          <button class="btn btn-next" onclick="changeCard(1)">Далее →</button>
        </div>
      </div>

      <!-- TEST -->
      <div id="testZone" style="display:none">
        <div class="fc-example" id="fcExampleTest"></div>
        <input type="text" class="test-input" id="testInput" placeholder="Введи перевод на русском…" onkeydown="if(event.key==='Enter') checkTest()" />
        <div class="test-feedback" id="testFeedback"></div>
        <button class="btn-check" id="btnCheck" onclick="checkTest()">Проверить</button>
        <div class="btn-row">
          <button class="btn btn-prev" id="prevBtnTest" onclick="changeCard(-1)" disabled>←</button>
          <button class="btn btn-next" onclick="changeCard(1)" style="flex:1">Следующее →</button>
        </div>
      </div>
    </div>
  </div>

  <div class="finish-screen" id="finishScreen">
    <div class="fs-emoji" id="fsEmoji">🌟</div>
    <h2 id="fsTitle">Раунд завершён!</h2>
    <p  id="fsSubtitle"></p>
    <div class="finish-stats">
      <div class="fstat"><div class="fn" id="fsLearned" style="color:var(--emerald)">0</div><div class="fl">Выучено</div></div>
      <div class="fstat"><div class="fn" id="fsTotal">20</div><div class="fl">Всего</div></div>
      <div class="fstat"><div class="fn" id="fsPct" style="color:var(--rose)">0%</div><div class="fl">Результат</div></div>
    </div>
    <button class="btn-restart" onclick="restartSession()">🔁 Ещё раз</button>
  </div>

</div>

<div class="nav-pill">
  <a href="./index.html">🏠 Home</a>
  <a href="./homework.html">📝 HW</a>
  <a href="./vocabulary-hub.html" class="active">💥 Vocab</a>
</div>

<script>
// ══════════════════════════════════════════
// DATA — 20 слов из 4 историй про языковые классы (Workbook, Unit 1)
// ══════════════════════════════════════════
const vocab = [
  { id:1,  word:"accident",       trans:"несчастный случай, авария",      example:"I was on a cycling holiday in Spain and I had an accident.",                   hint:"💡 Несчастный случай, травма. Не путать с accidentally (случайно).",         icon:"🚑", bg:"#fef2f2", tag:"Alex" },
  { id:2,  word:"medical",        trans:"медицинский",                    example:"I didn't know any medical words before my accident.",                          hint:"💡 Medical words = слова, связанные с лечением, врачами, частями тела.",      icon:"🩺", bg:"#eff6ff", tag:"Alex" },
  { id:3,  word:"stay with me",   trans:"остаться в памяти, не забыться", example:"And it has stayed with me to this day!",                                         hint:"💡 Stay with sb = запомниться навсегда. Прошедшее время — stayed.",            icon:"🧠", bg:"#f0fdf4", tag:"Ex.9" },
  { id:4,  word:"sceptical",      trans:"скептический, недоверчивый",     example:"I was a bit sceptical about how much we could pick up in such a short time.",   hint:"💡 Sceptical about = не верящий, что что-то получится или сработает.",         icon:"🤨", bg:"#fdf4ff", tag:"Mike" },
  { id:5,  word:"pick up",        trans:"освоить, выучить (без усилий)",   example:"How much could we pick up in such a short time?",                              hint:"💡 Pick up a language = выучить естественным путём, без формальных занятий.", icon:"🎯", bg:"#fff7ed", tag:"Mike" },
  { id:6,  word:"go along",       trans:"пойти куда-то (без особого энтузиазма)", example:"There was nothing much else to do so we went along.",                     hint:"💡 Go along = присоединиться, пойти за компанию, без большого желания.",      icon:"🚶", bg:"#f0fdfa", tag:"Mike" },
  { id:7,  word:"go off to",      trans:"отправиться куда-то",            example:"I went off to a German class with a friend and really enjoyed it.",            hint:"💡 Go off to + место = уйти/отправиться куда-либо (предлог off в Ex.9 №3).",  icon:"🏃", bg:"#eff6ff", tag:"Ex.9" },
  { id:8,  word:"on the other side", trans:"на другой стороне",          example:"The best thing was using the language on the other side of the Channel.",       hint:"💡 The Channel — пролив между Англией и Францией (см. Glossary).",            icon:"🌊", bg:"#f0fdf4", tag:"Mike" },
  { id:9,  word:"packed",         trans:"набитый людьми, переполненный", example:"I was on a packed train using my teach yourself Japanese book and CD.",         hint:"💡 Packed = очень много людей, негде сесть. Packed train/room/bus.",          icon:"🚇", bg:"#fdf4ff", tag:"Cerys" },
  { id:10, word:"confident",      trans:"уверенный (в себе)",             example:"I didn't feel confident to start up a conversation.",                          hint:"💡 Confident to do sth = достаточно уверенный, чтобы решиться на что-то.",     icon:"💪", bg:"#fff7ed", tag:"Cerys" },
  { id:11, word:"reserved",       trans:"сдержанный, замкнутый",          example:"Everyone was very reserved until the train broke down.",                       hint:"💡 Reserved (о человеке) = немногословный, не любит первым начинать разговор.", icon:"🤐", bg:"#eff6ff", tag:"Cerys" },
  { id:12, word:"start up",       trans:"завязать (разговор)",            example:"The most difficult thing is often starting up a conversation.",                 hint:"💡 Start up a conversation = начать разговор с незнакомым человеком.",         icon:"💬", bg:"#f0fdf4", tag:"Ex.9" },
  { id:13, word:"broke down",     trans:"сломался, заглох (транспорт)",   example:"Suddenly, we broke down in the middle of a long tunnel.",                       hint:"💡 Break down (о машине/поезде) = перестать работать. Прошедшее — broke down.", icon:"🛑", bg:"#fdf4ff", tag:"Cerys" },
  { id:14, word:"found out",      trans:"обнаружил(а), узнал(а)",         example:"I found out that I knew more than I thought.",                                  hint:"💡 Find out = выяснить, узнать что-то новое о себе или ситуации.",            icon:"💡", bg:"#fff7ed", tag:"Cerys" },
  { id:15, word:"keen to sign up", trans:"очень хотел(а) записаться",     example:"I was really keen to sign up for the new language school.",                    hint:"💡 Be keen to do sth = очень хотеть. Sign up (for) = записаться (на курс).",   icon:"✍️", bg:"#eff6ff", tag:"Lydia" },
  { id:16, word:"top up",         trans:"пополнить, дополнить (знания)",  example:"I thought a native speaker would help me top up what I already knew.",         hint:"💡 Top up = добавить к уже имеющемуся. Top up your English (Ex.9 №2).",        icon:"⬆️", bg:"#f0fdf4", tag:"Lydia" },
  { id:17, word:"find out about", trans:"узнать о (чём-то)",              example:"We'd like to find out about Russian classes in our area.",                     hint:"💡 Find out about sth = разузнать информацию о чём-либо (Ex.9 №6).",          icon:"🔎", bg:"#fdf4ff", tag:"Ex.9" },
  { id:18, word:"electricity had failed", trans:"электричество отключилось", example:"The electricity had failed but the teachers used different spaces.",        hint:"💡 Fail (об электричестве/технике) = перестать работать, отключиться.",        icon:"⚡", bg:"#fff7ed", tag:"Lydia" },
  { id:19, word:"broke the ice",  trans:"растопить лёд, снять неловкость", example:"It was a strange first lesson but it really broke the ice.",                   hint:"💡 Break the ice = снять напряжение/неловкость при первом знакомстве.",        icon:"🧊", bg:"#eff6ff", tag:"Lydia" },
  { id:20, word:"of all places",  trans:"вот уж где, надо же — именно там", example:"On a ferry, of all places.",                                                    hint:"💡 Of all places/things = выражает удивление неожиданностью места/предмета.",  icon:"😲", bg:"#f0fdf4", tag:"Mike" },
];

const TOTAL  = vocab.length;

// ══════════════════════════════════════════
// SUPABASE + STATE
// Своё отдельное поле в Supabase (language_classes_learned) и свой
// localStorage-ключ — чтобы не конфликтовать с тренажёром урока 5.
// ══════════════════════════════════════════
const SB_URL = "https://zqzgarvmpqqqaobeicpc.supabase.co";
const SB_KEY = "sb_publishable_tLdpYQZSbjxOZGQpee_jMQ_lfOBYZxC";
const LS_KEY = 'polina_vocab_language_classes_state';

let learnedSet = new Set();
let hardSet    = new Set();
let mode = 'learn';
let deck = [...vocab];
let idx  = 0;
let testChecked = false;

function loadState() {
  try {
    const r = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    learnedSet = new Set(r.learned || []);
    hardSet    = new Set(r.hard    || []);
  } catch(e) {}
}
function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ learned:[...learnedSet], hard:[...hardSet] }));
  localStorage.setItem('polina_vocab_language_classes', learnedSet.size);
  syncToSupabase(learnedSet.size);
  updateHero();
}
async function syncToSupabase(n) {
  try {
    await fetch(`${SB_URL}/rest/v1/progress`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}`, 'Prefer':'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ student:'polina', language_classes_learned: n, updated_at: new Date().toISOString() })
    });
  } catch(e) {}
}
async function loadFromSupabase() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/progress?student=eq.polina&select=language_classes_learned`, {
      headers: { 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}` }
    });
    const d = await r.json();
    if (d && d[0] && d[0].language_classes_learned) localStorage.setItem('polina_vocab_language_classes', d[0].language_classes_learned);
  } catch(e) {}
}

function updateHero() {
  const n = learnedSet.size;
  document.getElementById('heroProgFill').style.width  = Math.round(n/TOTAL*100) + '%';
  document.getElementById('heroProgLabel').textContent = `${n} / ${TOTAL} выучено`;
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const card = deck[idx];
  if (!card) { showFinish(); return; }

  updateHero();
  document.getElementById('ccPos').textContent = (idx+1)+' / '+deck.length;

  const badge = document.getElementById('learnedBadge');
  badge.className = learnedSet.has(card.id) ? 'learned-badge' : 'not-learned-badge';
  badge.textContent = learnedSet.has(card.id) ? '✓ Выучено' : '○ Не выучено';

  const img = document.getElementById('fcImage');
  img.textContent = card.icon;
  img.style.background = `linear-gradient(135deg,${card.bg},#fff)`;

  document.getElementById('fcWord').textContent        = card.word;
  document.getElementById('fcTag').textContent         = card.tag;
  document.getElementById('fcTranslation').textContent = '🇷🇺 ' + card.trans;
  document.getElementById('fcExample').textContent     = card.example;
  document.getElementById('fcHint').textContent        = card.hint;

  if (document.getElementById('fcExampleTest'))
    document.getElementById('fcExampleTest').textContent = card.example;

  const ti = document.getElementById('testInput');
  const tf = document.getElementById('testFeedback');
  const bc = document.getElementById('btnCheck');
  ti.value=''; ti.className='test-input';
  tf.className='test-feedback'; tf.style.display='none';
  bc.textContent='Проверить';
  testChecked = false;

  document.getElementById('prevBtn').disabled     = idx === 0;
  document.getElementById('prevBtnTest').disabled = idx === 0;
}

// ══════════════════════════════════════════
// LEARN
// ══════════════════════════════════════════
function markCard(knows) {
  const card = deck[idx];
  if (knows) { learnedSet.add(card.id); hardSet.delete(card.id); }
  else        { hardSet.add(card.id); }
  saveState();
  changeCard(1);
}

// ══════════════════════════════════════════
// TEST
// ══════════════════════════════════════════
function norm(s){ return s.toLowerCase().trim().replace(/[ё]/g,'е').replace(/[\s,.\-!?]/g,''); }

function checkTest() {
  if (testChecked) { changeCard(1); return; }
  const card = deck[idx];
  const val  = document.getElementById('testInput').value.trim();
  const keys = card.trans.split(',').map(k=>k.trim());
  const ok   = val !== '' && keys.some(k => norm(val).includes(norm(k)));

  const ti = document.getElementById('testInput');
  const tf = document.getElementById('testFeedback');
  const bc = document.getElementById('btnCheck');

  ti.className = 'test-input ' + (ok ? 'correct' : 'wrong');
  tf.className = 'test-feedback ' + (ok ? 'correct' : 'wrong');
  tf.textContent = ok ? `✓ Верно! «${card.trans}»` : `✗ Правильно: «${card.trans}»`;
  tf.style.display = 'block';

  if (ok) { learnedSet.add(card.id); hardSet.delete(card.id); }
  else    { hardSet.add(card.id); learnedSet.delete(card.id); }

  saveState(); testChecked = true;
  bc.textContent = 'Следующее →';
}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
function changeCard(dir) {
  const newIdx = idx + dir;
  if (newIdx < 0) return;
  if (newIdx >= deck.length) { showFinish(); return; }
  idx = newIdx;
  render();
  if (mode === 'test') setTimeout(()=>document.getElementById('testInput').focus(), 50);
}

// ══════════════════════════════════════════
// MODES
// ══════════════════════════════════════════
function setMode(m) {
  mode = m;
  ['learn','test','hard'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===m));
  document.getElementById('learnZone').style.display  = m !== 'test' ? '' : 'none';
  document.getElementById('testZone').style.display   = m === 'test'  ? '' : 'none';
  document.getElementById('flashcard').style.display  = 'block';
  document.getElementById('finishScreen').style.display = 'none';
  document.getElementById('cardCounter').style.display  = 'flex';

  if (m === 'hard') {
    deck = vocab.filter(c => hardSet.has(c.id));
    if (deck.length === 0) { deck = [...vocab]; alert('Сложных слов пока нет — показываю все!'); }
  } else {
    deck = [...vocab];
  }
  idx = 0; render();
  if (m === 'test') setTimeout(()=>document.getElementById('testInput').focus(), 50);
}

// ══════════════════════════════════════════
// FINISH
// ══════════════════════════════════════════
function showFinish() {
  document.getElementById('flashcard').style.display    = 'none';
  document.getElementById('cardCounter').style.display  = 'none';
  document.getElementById('finishScreen').style.display = 'block';
  const n=learnedSet.size, t=vocab.length, p=Math.round(n/t*100);
  document.getElementById('fsLearned').textContent = n;
  document.getElementById('fsTotal').textContent   = t;
  document.getElementById('fsPct').textContent     = p+'%';
  let e='💪', ti='Хорошее начало!', s='Продолжай!';
  if(p>=90){e='🏆';ti='Блестяще!';s='Ты выучила почти всё!';}
  else if(p>=70){e='🌟';ti='Отлично!';s='Ещё раунд — и знаешь всё!';}
  else if(p>=50){e='👍';ti='Неплохо!';s='Больше половины позади!';}
  document.getElementById('fsEmoji').textContent    = e;
  document.getElementById('fsTitle').textContent    = ti;
  document.getElementById('fsSubtitle').textContent = s;
  saveState();
}
function restartSession() {
  document.getElementById('cardCounter').style.display = 'flex';
  setMode(mode);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('load', async () => {
  await loadFromSupabase();
  loadState();
  deck = [...vocab]; idx = 0; mode = 'learn';
  document.getElementById('tab-learn').classList.add('active');
  document.getElementById('learnZone').style.display = '';
  document.getElementById('testZone').style.display  = 'none';
  document.getElementById('flashcard').style.display = 'block';
  document.getElementById('finishScreen').style.display = 'none';
  document.getElementById('cardCounter').style.display  = 'flex';
  render();
});
</script>
</body>
</html>
