<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase PATCH Progress Test</title>
  <style>
    *{box-sizing:border-box} body{font-family:Inter,Arial,sans-serif;background:#eef3f8;color:#0f172a;margin:0;padding:28px} .wrap{max-width:980px;margin:0 auto}.card{background:white;border:1px solid #dbe3ee;border-radius:18px;padding:26px;margin-bottom:20px;box-shadow:0 10px 30px rgba(15,23,42,.08)} h1{margin:0 0 8px;font-size:30px}.muted{color:#64748b;line-height:1.5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:700px){.grid{grid-template-columns:1fr}} label{display:block;font-weight:700;margin:12px 0 6px} input{width:100%;padding:12px 14px;border:1.5px solid #cbd5e1;border-radius:10px;font-size:15px} button{border:0;border-radius:12px;padding:13px 18px;font-weight:800;cursor:pointer;margin:8px 8px 0 0} .primary{background:#4f46e5;color:white}.blue{background:#dbeafe;color:#1e3a8a}.red{background:#fee2e2;color:#991b1b}.green{background:#dcfce7;color:#166534}.log{background:#0f172a;color:#d1fae5;border-radius:14px;padding:18px;min-height:260px;white-space:pre-wrap;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:14px;line-height:1.55}.status{padding:14px;border-radius:12px;margin-top:14px;font-weight:800;display:none}.ok{background:#dcfce7;color:#166534}.bad{background:#fee2e2;color:#991b1b}.warn{background:#fef3c7;color:#92400e}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Тест сохранения прогресса через PATCH</h1>
    <p class="muted">Эта страница ничего не отправляет в Telegram и не является домашкой ученика. Она проверяет только обновление существующей строки <b>student = polina</b> в таблице <b>progress</b>.</p>
    <div class="grid">
      <div><label>Ключ теста в hw_scores</label><input id="testKey" value="patch_save_test"></div>
      <div><label>Тестовый результат</label><input id="testValue" value="PATCH_OK"></div>
    </div>
    <button class="blue" onclick="readProgress()">1. Прочитать текущий прогресс</button>
    <button class="primary" onclick="writePatchTest()">2. Записать тест через PATCH</button>
    <button class="green" onclick="verifyTest()">3. Проверить запись</button>
    <button class="red" onclick="removePatchTest()">4. Удалить тестовый ключ</button>
    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>Лог</h2>
    <div id="log" class="log">Готово. Нажми «Прочитать текущий прогресс».</div>
  </div>
</div>

<script>
const SB_URL = "https://zqzgarvmpqqqaobeicpc.supabase.co";
const SB_KEY = "sb_publishable_tLdpYQZSbjxOZGQpee_jMQ_lfOBYZxC";
const STUDENT = "polina";

function now(){ return new Date().toLocaleTimeString('ru-RU'); }
function log(msg, obj){
  const el = document.getElementById('log');
  if (el.textContent === 'Готово. Нажми «Прочитать текущий прогресс».') el.textContent = '';
  el.textContent += `[${now()}] ${msg}` + (obj !== undefined ? '\n' + JSON.stringify(obj, null, 2) : '') + '\n\n';
  el.scrollTop = el.scrollHeight;
}
function setStatus(type, text){
  const s = document.getElementById('status');
  s.className = 'status ' + type;
  s.textContent = text;
  s.style.display = 'block';
}
function headers(extra={}){
  return { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, ...extra };
}
async function readCurrent(label='GET'){
  const url = `${SB_URL}/rest/v1/progress?student=eq.${encodeURIComponent(STUDENT)}&select=student,hw_scores,hw_answers,updated_at`;
  const res = await fetch(url, { headers: headers() });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = text; }
  log(`${label} status: ${res.status} / ok: ${res.ok}`, data);
  if (!res.ok) throw new Error(`GET failed ${res.status}: ${text}`);
  if (!Array.isArray(data) || data.length === 0) throw new Error('Строка student=polina не найдена');
  return data[0];
}
async function readProgress(){
  try {
    setStatus('warn', 'Читаем данные...');
    await readCurrent('GET current progress');
    setStatus('ok', '✅ Чтение работает. Строка polina найдена.');
  } catch(e){
    log('ERROR', String(e.message || e));
    setStatus('bad', '❌ Ошибка чтения: ' + (e.message || e));
  }
}
async function writePatchTest(){
  try {
    setStatus('warn', 'Пробуем записать через PATCH...');
    const key = document.getElementById('testKey').value.trim() || 'patch_save_test';
    const value = document.getElementById('testValue').value.trim() || 'PATCH_OK';
    const current = await readCurrent('GET before PATCH');
    const currentScores = current.hw_scores || {};
    const currentAnswers = current.hw_answers || {};
    const payload = {
      hw_scores: { ...currentScores, [key]: value },
      hw_answers: { ...currentAnswers, [key]: { test: true, saved_at: new Date().toISOString(), method: 'PATCH diagnostic test only' } },
      updated_at: new Date().toISOString()
    };
    log('Payload для PATCH:', payload);
    const patchUrl = `${SB_URL}/rest/v1/progress?student=eq.${encodeURIComponent(STUDENT)}`;
    const res = await fetch(patchUrl, {
      method: 'PATCH',
      headers: headers({ 'Content-Type':'application/json', Prefer:'return=representation' }),
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = text; }
    log(`PATCH status: ${res.status} / ok: ${res.ok}`, data);
    if (!res.ok) throw new Error(`PATCH failed ${res.status}: ${text}`);
    setStatus('ok', `✅ PATCH сработал. В hw_scores должен быть ключ «${key}».`);
  } catch(e){
    log('ERROR', String(e.message || e));
    setStatus('bad', '❌ Ошибка записи: ' + (e.message || e));
  }
}
async function verifyTest(){
  try {
    const key = document.getElementById('testKey').value.trim() || 'patch_save_test';
    setStatus('warn', 'Проверяем запись...');
    const row = await readCurrent('GET after PATCH');
    if (row.hw_scores && Object.prototype.hasOwnProperty.call(row.hw_scores, key)) {
      setStatus('ok', `✅ Запись найдена: hw_scores.${key} = ${row.hw_scores[key]}`);
    } else {
      setStatus('bad', `❌ Ключ «${key}» не найден в hw_scores.`);
    }
  } catch(e){
    log('ERROR', String(e.message || e));
    setStatus('bad', '❌ Ошибка проверки: ' + (e.message || e));
  }
}
async function removePatchTest(){
  try {
    const key = document.getElementById('testKey').value.trim() || 'patch_save_test';
    setStatus('warn', 'Удаляем тестовый ключ...');
    const current = await readCurrent('GET before cleanup');
    const scores = { ...(current.hw_scores || {}) };
    const answers = { ...(current.hw_answers || {}) };
    delete scores[key];
    delete answers[key];
    const payload = { hw_scores: scores, hw_answers: answers, updated_at: new Date().toISOString() };
    log('Payload для cleanup PATCH:', payload);
    const res = await fetch(`${SB_URL}/rest/v1/progress?student=eq.${encodeURIComponent(STUDENT)}`, {
      method:'PATCH',
      headers: headers({ 'Content-Type':'application/json', Prefer:'return=representation' }),
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = text; }
    log(`CLEANUP PATCH status: ${res.status} / ok: ${res.ok}`, data);
    if (!res.ok) throw new Error(`Cleanup failed ${res.status}: ${text}`);
    setStatus('ok', `✅ Тестовый ключ «${key}» удалён.`);
  } catch(e){
    log('ERROR', String(e.message || e));
    setStatus('bad', '❌ Ошибка удаления: ' + (e.message || e));
  }
}
</script>
</body>
</html>
