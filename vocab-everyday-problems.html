<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everyday Problems — Vocabulary</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #f43f5e; --rose-dark: #be185d;
      --indigo: #4f46e5; --emerald: #10b981;
      --amber: #f59e0b; --violet: #8b5cf6;
      --bg: #f1f5f9; --card: #ffffff;
      --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:110px; }

    /* HERO */
    .hero { background:linear-gradient(135deg,#be185d 0%,#e11d48 45%,#f43f5e 100%); padding:36px 24px 48px; position:relative; }
    .hero::before { content:''; position:absolute; inset:0; background:url("data:image/svg+xml,%3Csvg width='48' height='48' viewBox='0 0 48 48' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='24' cy='24' r='3' fill='%23ffffff' fill-opacity='0.07'/%3E%3C/svg%3E"); pointer-events:none; }
    .hero-wave { display:block; width:100%; line-height:0; background:var(--bg); }
    .hero-wave svg { display:block; width:100%; }
    .hero-back { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,.75); font-size:13px; font-weight:600; text-decoration:none; margin-bottom:18px; transition:color .2s; }
    .hero-back:hover { color:#fff; }
    .hero-badge { display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.28); color:#fff; font-size:12px; font-weight:600; padding:5px 14px; border-radius:100px; margin-bottom:12px; }
    .hero h1 { font-family:'Plus Jakarta Sans',sans-serif; font-size:clamp(22px,5vw,36px); font-weight:800; color:#fff; letter-spacing:-.5px; margin-bottom:6px; }
    .hero p { color:rgba(255,255,255,.75); font-size:14px; }
    .hero-prog-row { display:flex; align-items:center; gap:14px; margin-top:18px; position:relative; z-index:1; }
    .hero-prog-bg { flex:1; height:7px; background:rgba(255,255,255,.25); border-radius:100px; overflow:hidden; max-width:280px; }
    .hero-prog-fill { height:100%; background:#fff; border-radius:100px; transition:width .6s ease; }
    .hero-prog-label { color:rgba(255,255,255,.9); font-size:13px; font-weight:700; white-space:nowrap; }

    .page { max-width:680px; margin:0 auto; padding:0 20px; }

    /* TOPIC TABS */
    .topic-tabs { display:flex; gap:10px; margin:-18px 0 24px; flex-wrap:wrap; }
    .topic-tab { flex:1; min-width:130px; text-align:center; background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:12px 10px; cursor:pointer; transition:all .2s; }
    .topic-tab .tt-icon { font-size:20px; margin-bottom:4px; }
    .topic-tab .tt-label { font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; color:var(--muted); }
    .topic-tab .tt-count { font-size:11px; color:var(--muted); margin-top:2px; }
    .topic-tab.active { border-color:var(--rose); background:#fff1f2; box-shadow:0 4px 16px rgba(244,63,94,.12); }
    .topic-tab.active .tt-label { color:var(--rose-dark); }

    /* MODE TABS */
    .mode-tabs { display:flex; gap:8px; margin-bottom:20px; }
    .mode-tab { flex:1; text-align:center; background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:11px 8px; cursor:pointer; transition:all .18s; }
    .mode-tab .mt-icon { font-size:18px; margin-bottom:3px; }
    .mode-tab .mt-label { font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700; color:var(--muted); }
    .mode-tab.active { border-color:var(--rose); background:#fff1f2; }
    .mode-tab.active .mt-label { color:var(--rose-dark); }

    /* COUNTER */
    .card-counter { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .cc-pos { font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; }
    .learned-badge { display:inline-flex; align-items:center; gap:5px; background:#d1fae5; color:#065f46; font-size:12px; font-weight:700; padding:4px 12px; border-radius:100px; }
    .not-learned-badge { display:inline-flex; align-items:center; gap:5px; background:#f1f5f9; color:var(--muted); font-size:12px; font-weight:700; padding:4px 12px; border-radius:100px; }

    /* FLASHCARD */
    .flashcard { background:var(--card); border-radius:24px; border:1.5px solid var(--border); overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.06); margin-bottom:18px; }
    .fc-image { width:100%; height:180px; display:flex; align-items:center; justify-content:center; font-size:80px; user-select:none; }
    .fc-body { padding:20px 22px 20px; }
    .fc-word-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
    .fc-word { font-family:'Plus Jakarta Sans',sans-serif; font-size:24px; font-weight:800; color:var(--text); line-height:1.2; }
    .fc-tag { font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; padding:4px 12px; border-radius:100px; white-space:nowrap; margin-top:4px; background:#fff1f2; color:var(--rose-dark); }
    .fc-translation-box { background:#f0fdf4; border:1.5px solid #6ee7b7; border-radius:12px; padding:14px 16px; font-weight:700; font-size:16px; color:#065f46; text-align:center; margin-bottom:12px; }
    .fc-example { font-style:italic; font-size:13px; color:var(--muted); background:#f8fafc; padding:11px 13px; border-radius:10px; line-height:1.6; border-left:3px solid #e2e8f0; margin-bottom:12px; }
    .fc-hint { font-size:12px; color:#78350f; background:#fefce8; border-radius:8px; padding:8px 12px; line-height:1.5; margin-bottom:14px; }

    /* KNOW ROW */
    .know-row { display:flex; gap:10px; margin-bottom:6px; }
    .btn-know { flex:1; padding:13px 10px; border:2px solid #bbf7d0; border-radius:14px; background:#f0fdf4; color:#065f46; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .18s; }
    .btn-know:hover { background:#dcfce7; }
    .btn-dontknow { flex:1; padding:13px 10px; border:2px solid #fecaca; border-radius:14px; background:#fff5f5; color:#991b1b; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .18s; }
    .btn-dontknow:hover { background:#fee2e2; }
    .btn-row { display:flex; gap:10px; margin-top:12px; }
    .btn { flex:1; padding:13px 10px; border:none; border-radius:14px; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .18s; display:flex; align-items:center; justify-content:center; gap:7px; }
    .btn:active { transform:scale(.97); }
    .btn-prev { background:#f1f5f9; color:var(--muted); flex:0 0 50px; padding:13px; font-size:16px; }
    .btn-prev:hover { background:#e2e8f0; }
    .btn-prev:disabled { opacity:.3; cursor:default; }
    .btn-next { background:#0f172a; color:#fff; }
    .btn-next:hover { background:#1e293b; }

    /* TEST MODE */
    .test-input { width:100%; padding:14px 16px; font-size:16px; font-family:inherit; border:2px solid var(--border); border-radius:14px; background:#fafbff; color:var(--text); transition:border-color .2s; margin-bottom:10px; }
    .test-input:focus { outline:none; border-color:var(--rose); background:#fff; }
    .test-input.correct { border-color:var(--emerald); background:#f0fdf4; }
    .test-input.wrong { border-color:var(--rose); background:#fff5f5; }
    .test-feedback { font-size:14px; font-weight:600; padding:10px 14px; border-radius:10px; margin-bottom:10px; display:none; }
    .test-feedback.correct { background:#d1fae5; color:#065f46; display:block; }
    .test-feedback.wrong { background:#ffe4e6; color:#9f1239; display:block; }
    .btn-check { width:100%; padding:14px; background:linear-gradient(135deg,#be185d,#f43f5e); color:#fff; border:none; border-radius:14px; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:10px; transition:opacity .2s; }
    .btn-check:hover { opacity:.9; }

    /* IRREGULAR VERBS TABLE MODE */
    .verbs-table-wrap { background:var(--card); border-radius:20px; border:1.5px solid var(--border); overflow:hidden; margin-bottom:18px; }
    .vt-header { background:#0f172a; padding:18px 22px; display:flex; align-items:center; gap:10px; }
    .vt-header h3 { font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; color:#fff; }
    .vt-submode { display:flex; gap:8px; padding:14px 22px; background:#fafbff; border-bottom:1px solid var(--border); }
    .vt-sub-btn { padding:6px 16px; border-radius:100px; border:1.5px solid var(--border); background:#fff; font-size:12px; font-weight:700; cursor:pointer; color:var(--muted); transition:all .18s; }
    .vt-sub-btn.active { background:#0f172a; border-color:#0f172a; color:#fff; }
    table.vt { width:100%; border-collapse:collapse; }
    table.vt th { background:#f8fafc; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); padding:10px 18px; text-align:left; border-bottom:1px solid var(--border); }
    table.vt td { padding:12px 18px; font-size:14px; border-bottom:1px solid var(--border); }
    table.vt tr:last-child td { border-bottom:none; }
    table.vt tr:hover td { background:#fafbff; }
    table.vt td:first-child { font-weight:700; color:var(--indigo); }
    table.vt td:last-child { color:var(--muted); font-size:13px; }
    /* verb test */
    .verb-test-wrap { padding:18px 22px; }
    .vtest-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; font-size:14px; flex-wrap:wrap; }
    .vtest-row .v1 { font-weight:700; color:var(--indigo); min-width:80px; }
    .vtest-inp { padding:7px 12px; font-size:13px; font-family:inherit; border:1.5px solid var(--border); border-radius:9px; background:#fafbff; color:var(--text); width:110px; transition:border-color .2s; }
    .vtest-inp:focus { outline:none; border-color:var(--indigo); }
    .vtest-inp.correct { border-color:var(--emerald); background:#f0fdf4; }
    .vtest-inp.wrong { border-color:var(--rose); background:#fff5f5; }
    .vtest-fb { font-size:12px; font-weight:600; }
    .vtest-fb.c { color:var(--emerald); }
    .vtest-fb.w { color:var(--rose); }
    .btn-check-verbs { margin:10px 22px 18px; width:calc(100% - 44px); padding:13px; background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff; border:none; border-radius:12px; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:opacity .2s; }
    .btn-check-verbs:hover { opacity:.88; }

    /* FINISH */
    .finish-screen { display:none; text-align:center; background:var(--card); border-radius:24px; border:1.5px solid var(--border); padding:40px 24px; }
    .finish-screen .fs-emoji { font-size:64px; margin-bottom:16px; }
    .finish-screen h2 { font-family:'Plus Jakarta Sans',sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; }
    .finish-screen p { font-size:15px; color:var(--muted); margin-bottom:24px; }
    .finish-stats { display:flex; gap:12px; justify-content:center; margin-bottom:28px; flex-wrap:wrap; }
    .fstat { background:var(--bg); border-radius:14px; padding:14px 20px; min-width:90px; }
    .fstat .fn { font-family:'Plus Jakarta Sans',sans-serif; font-size:26px; font-weight:800; }
    .fstat .fl { font-size:11px; color:var(--muted); font-weight:600; }
    .btn-restart { background:linear-gradient(135deg,#be185d,#f43f5e); color:#fff; border:none; border-radius:14px; padding:14px 32px; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }

    /* NAV */
    .nav-pill { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#0f172a; border-radius:100px; padding:12px 24px; display:flex; gap:4px; box-shadow:0 8px 32px rgba(15,23,42,.3); z-index:900; white-space:nowrap; }
    .nav-pill a { color:rgba(255,255,255,.6); font-size:12px; font-weight:600; text-decoration:none; padding:6px 14px; border-radius:100px; transition:all .2s; }
    .nav-pill a:hover, .nav-pill a.active { background:var(--indigo); color:#fff; }
  </style>
</head>
<body>

<div class="hero">
  <div class="page" style="position:relative;z-index:1">
    <a href="./vocabulary-hub.html" class="hero-back">← Vocabulary Hub</a>
    <div class="hero-badge" id="heroBadge">💥 Everyday Problems · 30 слов</div>
    <h1 id="heroTitle">Everyday Minor Problems</h1>
    <p>Учи слова с карточками — в своём темпе</p>
    <div class="hero-prog-row" style="position:relative;z-index:1">
      <div class="hero-prog-bg"><div class="hero-prog-fill" id="heroProgFill" style="width:0%"></div></div>
      <div class="hero-prog-label" id="heroProgLabel">0 / 30 выучено</div>
    </div>
  </div>
</div>
<div class="hero-wave">
  <svg viewBox="0 0 1440 56" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="background:linear-gradient(135deg,#be185d,#e11d48 45%,#f43f5e)">
    <path d="M0,56 C360,0 1080,0 1440,56 L1440,56 L0,56 Z" fill="#f1f5f9"/>
  </svg>
</div>

<div class="page">

  <!-- MODE TABS -->
  <div class="mode-tabs" style="margin-top:24px">
    <div class="mode-tab active" id="tab-learn" onclick="setMode('learn')"><div class="mt-icon">📖</div><div class="mt-label">Учить</div></div>
    <div class="mode-tab" id="tab-test"  onclick="setMode('test')"> <div class="mt-icon">✏️</div><div class="mt-label">Тест</div></div>
    <div class="mode-tab" id="tab-hard"  onclick="setMode('hard')"> <div class="mt-icon">🔁</div><div class="mt-label">Сложные</div></div>
  </div>

  <div class="card-counter" id="cardCounter">
    <div class="cc-pos" id="ccPos">1 / 30</div>
    <div id="learnedBadge" class="not-learned-badge">○ Не выучено</div>
  </div>

    <div class="flashcard" id="flashcard">
      <div class="fc-image" id="fcImage"></div>
      <div class="fc-body">
        <div class="fc-word-row">
          <div class="fc-word" id="fcWord"></div>
          <div class="fc-tag"  id="fcTag"></div>
        </div>
        <!-- LEARN -->
        <div id="learnZone">
          <div class="fc-translation-box" id="fcTranslation"></div>
          <div class="fc-example" id="fcExample"></div>
          <div class="fc-hint"    id="fcHint"></div>
          <div class="know-row">
            <button class="btn-dontknow" onclick="markCard(false)">✗ Не знаю</button>
            <button class="btn-know"     onclick="markCard(true)">✓ Знаю!</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-prev" id="prevBtn" onclick="changeCard(-1)">←</button>
            <button class="btn btn-next" onclick="changeCard(1)">Далее →</button>
          </div>
        </div>
        <!-- TEST -->
        <div id="testZone" style="display:none">
          <div class="fc-example" id="fcExampleTest"></div>
          <input type="text" class="test-input" id="testInput" placeholder="Введи перевод на русском…" onkeydown="if(event.key==='Enter') checkTest()" />
          <div class="test-feedback" id="testFeedback"></div>
          <button class="btn-check" id="btnCheck" onclick="checkTest()">Проверить</button>
          <div class="btn-row">
            <button class="btn btn-prev" id="prevBtnTest" onclick="changeCard(-1)">←</button>
            <button class="btn btn-next" onclick="changeCard(1)" style="flex:1">Следующее →</button>
          </div>
        </div>
      </div>
    </div>

    <div class="finish-screen" id="finishScreen">
      <div class="fs-emoji" id="fsEmoji">🌟</div>
      <h2 id="fsTitle">Раунд завершён!</h2>
      <p  id="fsSubtitle"></p>
      <div class="finish-stats">
        <div class="fstat"><div class="fn" id="fsLearned" style="color:var(--emerald)">0</div><div class="fl">Выучено</div></div>
        <div class="fstat"><div class="fn" id="fsTotal">30</div><div class="fl">Всего</div></div>
        <div class="fstat"><div class="fn" id="fsPct" style="color:var(--rose)">0%</div><div class="fl">Результат</div></div>
      </div>
      <button class="btn-restart" onclick="restartSession()">🔁 Ещё раз</button>
    </div>
  </div>

</div>

<div class="nav-pill">
  <a href="index.html">🏠 Home</a>
  <a href="homework.html">📝 HW</a>
  <a href="vocabulary-hub.html" class="active">💥 Vocab</a>
</div>

<script>
// ══════════════════ DATA ══════════════════
const vocab = [
  {id:1,  word:"Break (broke, broken)",    trans:"ломать, ломаться",                    example:"Be careful with that glass vase, it might break.",                   hint:"💡 Самое базовое слово для любой поломки.",         icon:"🏺", bg:"#fff7ed", tag:"Basic"},
  {id:2,  word:"Mislay (mislaid)",          trans:"положить не туда, временно потерять", example:"I've mislaid my glasses again — I'm sure they're in the house.",      hint:"💡 Вещь не потеряна насовсем, просто забыли куда.",  icon:"🧐", bg:"#eff6ff", tag:"Losing"},
  {id:3,  word:"Spill (spilt/spilled)",     trans:"пролить, расплескать",                example:"She spilt some hot coffee on her new white skirt.",                   hint:"💡 Только для жидкостей.",                          icon:"☕", bg:"#fdf4ff", tag:"Liquids"},
  {id:4,  word:"Stain",                     trans:"пятно, оставлять пятно",              example:"Don't worry, tomato sauce won't leave a permanent stain.",            hint:"💡 Трудновыводимый след на ткани.",                  icon:"👕", bg:"#fef2f2", tag:"Liquids"},
  {id:5,  word:"Blocked",                   trans:"засорён, забит",                      example:"The kitchen sink is blocked with food scraps.",                       hint:"💡 Когда вода не уходит из раковины.",               icon:"🚰", bg:"#f0fdfa", tag:"Plumbing"},
  {id:6,  word:"Leak / Leaking",            trans:"протекать, утечка",                   example:"The roof is leaking because of the heavy rain.",                      hint:"💡 Жидкость вытекает через трещину.",                icon:"💧", bg:"#eff6ff", tag:"Plumbing"},
  {id:7,  word:"Dent",                      trans:"вмятина, помять",                     example:"He backed into a post and put a dent in the bumper.",                 hint:"💡 Деформация металла кузова от удара.",             icon:"🚗", bg:"#f8fafc", tag:"Car"},
  {id:8,  word:"Scratch",                   trans:"царапина, поцарапать",                example:"The cat left a nasty scratch on the wooden table.",                   hint:"💡 Тонкая линия на поверхности.",                    icon:"😼", bg:"#fff7ed", tag:"Surfaces"},
  {id:9,  word:"Lock oneself out",          trans:"запереться снаружи",                  example:"I locked myself out so I had to call a locksmith.",                   hint:"💡 Дверь закрылась, ключи внутри.",                  icon:"🚪", bg:"#fdf4ff", tag:"House"},
  {id:10, word:"Flat (battery)",            trans:"разряженный, севший",                 example:"The car won't start because the battery is flat.",                    hint:"💡 Батарея разряжена в ноль.",                       icon:"🪫", bg:"#fef2f2", tag:"Electronics"},
  {id:11, word:"Crash",                     trans:"зависнуть, дать сбой",               example:"My computer crashed before I could save the document.",                hint:"💡 Внезапная остановка работы программы.",           icon:"💻", bg:"#eff6ff", tag:"Tech"},
  {id:12, word:"Chipped",                   trans:"отколотый, со сколом",               example:"Don't use that chipped mug, you might cut your lip.",                 hint:"💡 Откололся кусочек от края посуды.",               icon:"🥛", bg:"#f0fdfa", tag:"Crockery"},
  {id:13, word:"Come off",                  trans:"отвалиться, оторваться",             example:"A button came off my coat while I was running.",                      hint:"💡 Деталь сама отсоединяется.",                      icon:"🧵", bg:"#fdf4ff", tag:"General"},
  {id:14, word:"Smash",                     trans:"разбить вдребезги",                  example:"The window smashed into a thousand pieces.",                          hint:"💡 Намного сильнее, чем break.",                     icon:"💥", bg:"#fef2f2", tag:"General"},
  {id:15, word:"Run out of",                trans:"закончиться, иссякнуть",             example:"We've run out of sugar — I need to go shopping.",                     hint:"💡 Запасы полностью истощились.",                    icon:"🫙", bg:"#fff7ed", tag:"Shortages"},
  {id:16, word:"Bang",                      trans:"удариться с грохотом",               example:"I stood up quickly and banged my head on the shelf.",                 hint:"💡 Болезненный удар обо что-то твёрдое.",            icon:"🤕", bg:"#fef2f2", tag:"Injuries"},
  {id:17, word:"Bruise",                    trans:"синяк, гематома",                    example:"She had a dark bruise on her arm where she got hit.",                 hint:"💡 Потемнение кожи после ушиба.",                    icon:"🟣", bg:"#fdf4ff", tag:"Injuries"},
  {id:18, word:"Graze",                     trans:"ссадина, содрать кожу",              example:"The boy fell on the asphalt and grazed his knee.",                    hint:"💡 Лёгкое сдирание кожи при падении.",               icon:"🛹", bg:"#fff7ed", tag:"Injuries"},

const SB_URL = "https://zqzgarvmpqqqaobeicpc.supabase.co";
const SB_KEY = "sb_publishable_tLdpYQZSbjxOZGQpee_jMQ_lfOBYZxC";

async function syncWordsToSupabase(words) {
  try {
    await fetch(`${SB_URL}/rest/v1/progress?student=eq.polina`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ words_learned: words, updated_at: new Date().toISOString() })
    });
  } catch(e) { console.error('Supabase sync error:', e); }
}

async function loadWordsFromSupabase() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/progress?student=eq.polina&select=words_learned`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const data = await r.json();
    if (data && data[0] && data[0].words_learned) {
      localStorage.setItem('polina_words_learned', data[0].words_learned);
    }
  } catch(e) { console.error('Supabase load error:', e); }
}
const LS_VERBS = 'polina_verb_hard';
let learnedSet = new Set();
let hardSet    = new Set();
let verbHardSet = new Set();
let mode = 'learn';
let deck = [...vocab];
let idx  = 0;
let testChecked = false;
let currentTopic = 'problems';
let verbMode = 'table';
let verbTestDeck = [];

function loadState() {
  try {
    const r = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    learnedSet  = new Set(r.learned || []);
    hardSet     = new Set(r.hard    || []);
  } catch(e) {}
  try {
    verbHardSet = new Set(JSON.parse(localStorage.getItem(LS_VERBS) || '[]'));
  } catch(e) {}
}
function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ learned:[...learnedSet], hard:[...hardSet] }));
  localStorage.setItem('polina_vocab_everyday', learnedSet.size);
  localStorage.setItem('polina_words_learned',  learnedSet.size);
  syncWordsToSupabase(learnedSet.size);
}
function saveVerbState() {
  localStorage.setItem(LS_VERBS, JSON.stringify([...verbHardSet]));
}

// ══════════════════ TOPIC SWITCH ══════════════════
function setTopic(t) {
  currentTopic = t;
  ['problems','verbs'].forEach(x => {
    document.getElementById('ttab-'+x).classList.toggle('active', x===t);
    document.getElementById('section-'+x).style.display = x===t ? '' : 'none';
  });
  if (t==='problems') updateHeroProblems();
  else updateHeroVerbs();
}

function updateHeroProblems() {
  document.getElementById('heroBadge').textContent   = '💥 Everyday Problems · 30 слов';
  document.getElementById('heroTitle').textContent   = 'Everyday Minor Problems';
  const n = learnedSet.size;
  document.getElementById('heroProgFill').style.width  = Math.round(n/30*100)+'%';
  document.getElementById('heroProgLabel').textContent = n+' / 30 выучено';
}
function updateHeroVerbs() {
  document.getElementById('heroBadge').textContent   = '📚 Irregular Verbs · 48 глаголов';
  document.getElementById('heroTitle').textContent   = 'Irregular Verbs';
  const hard = verbHardSet.size;
  document.getElementById('heroProgFill').style.width  = Math.round((1 - hard/irregularVerbs.length)*100)+'%';
  document.getElementById('heroProgLabel').textContent = hard+' сложных глаголов';
}

// ══════════════════ FLASHCARD RENDER ══════════════════
function render() {
  const card = deck[idx];
  if (!card) { showFinish(); return; }

  updateHeroProblems();
  document.getElementById('ccPos').textContent = (idx+1)+' / '+deck.length;

  const badge = document.getElementById('learnedBadge');
  if (learnedSet.has(card.id)) { badge.className='learned-badge'; badge.textContent='✓ Выучено'; }
  else                          { badge.className='not-learned-badge'; badge.textContent='○ Не выучено'; }

  const img = document.getElementById('fcImage');
  img.textContent = card.icon;
  img.style.background = 'linear-gradient(135deg,'+card.bg+',#fff)';

  document.getElementById('fcWord').textContent        = card.word;
  document.getElementById('fcTag').textContent         = card.tag;
  document.getElementById('fcTranslation').textContent = '🇷🇺 '+card.trans;
  document.getElementById('fcExample').textContent     = card.example;
  document.getElementById('fcHint').textContent        = card.hint;

  // test zone
  if (document.getElementById('fcExampleTest'))
    document.getElementById('fcExampleTest').textContent = card.example;
  const ti = document.getElementById('testInput');
  const tf = document.getElementById('testFeedback');
  const bc = document.getElementById('btnCheck');
  ti.value=''; ti.className='test-input';
  tf.className='test-feedback'; tf.style.display='none';
  bc.textContent='Проверить';
  testChecked = false;

  const pb  = document.getElementById('prevBtn');
  const pbt = document.getElementById('prevBtnTest');
  const dis = idx===0;
  if(pb)  pb.disabled  = dis;
  if(pbt) pbt.disabled = dis;
}

// ══════════════════ LEARN ══════════════════
function markCard(knows) {
  const card = deck[idx];
  if (knows) { learnedSet.add(card.id); hardSet.delete(card.id); }
  else        { hardSet.add(card.id); }
  saveState();
  changeCard(1);
}

// ══════════════════ TEST ══════════════════
function norm(s){ return s.toLowerCase().trim().replace(/[ё]/g,'е').replace(/[\s,.\-!?]/g,''); }

function checkTest() {
  if (testChecked) { changeCard(1); return; }
  const card = deck[idx];
  const val  = document.getElementById('testInput').value.trim();
  const keys = card.trans.split(',').map(k=>k.trim());
  const ok   = val !== '' && keys.some(k => norm(val).includes(norm(k)));

  const ti = document.getElementById('testInput');
  const tf = document.getElementById('testFeedback');
  const bc = document.getElementById('btnCheck');

  if (ok) {
    ti.className='test-input correct';
    tf.className='test-feedback correct';
    tf.textContent='✓ Верно! «'+card.trans+'»';
    learnedSet.add(card.id); hardSet.delete(card.id);
  } else {
    ti.className='test-input wrong';
    tf.className='test-feedback wrong';
    tf.textContent='✗ Правильно: «'+card.trans+'»';
    learnedSet.delete(card.id); hardSet.add(card.id);
  }
  tf.style.display='block';
  saveState(); testChecked=true;
  bc.textContent='Следующее →';
  render();
  ti.className = ok ? 'test-input correct' : 'test-input wrong';
  tf.style.display='block';
}

// ══════════════════ NAV ══════════════════
function changeCard(dir) {
  const newIdx = idx + dir;
  if (newIdx < 0) return;
  if (newIdx >= deck.length) { showFinish(); return; }
  idx = newIdx;
  render();
  if (mode==='test') setTimeout(()=>document.getElementById('testInput').focus(), 50);
}

// ══════════════════ MODES ══════════════════
function setMode(m) {
  mode = m;
  ['learn','test','hard'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===m));
  document.getElementById('learnZone').style.display = m!=='test' ? '' : 'none';
  document.getElementById('testZone').style.display  = m==='test'  ? '' : 'none';
  document.getElementById('flashcard').style.display = 'block';
  document.getElementById('finishScreen').style.display = 'none';
  document.getElementById('cardCounter').style.display  = 'flex';

  if (m==='hard') {
    deck = vocab.filter(c => hardSet.has(c.id));
    if (deck.length===0) { deck=[...vocab]; alert('Сложных слов пока нет — показываю все!'); }
  } else {
    deck = [...vocab];
  }
  idx=0; render();
  if (m==='test') setTimeout(()=>document.getElementById('testInput').focus(), 50);
}

// ══════════════════ FINISH ══════════════════
function showFinish() {
  document.getElementById('flashcard').style.display    = 'none';
  document.getElementById('cardCounter').style.display  = 'none';
  document.getElementById('finishScreen').style.display = 'block';
  const n=learnedSet.size, t=vocab.length, p=Math.round(n/t*100);
  document.getElementById('fsLearned').textContent = n;
  document.getElementById('fsTotal').textContent   = t;
  document.getElementById('fsPct').textContent     = p+'%';
  let e='💪',ti='Хорошее начало!',s='Продолжай!';
  if(p>=90){e='🏆';ti='Блестяще!';s='Ты выучила почти всё!';}
  else if(p>=70){e='🌟';ti='Отлично!';s='Ещё раунд — и знаешь всё!';}
  else if(p>=50){e='👍';ti='Неплохо!';s='Больше половины позади!';}
  document.getElementById('fsEmoji').textContent    = e;
  document.getElementById('fsTitle').textContent    = ti;
  document.getElementById('fsSubtitle').textContent = s;
  saveState(); updateHeroProblems();
}
function restartSession() {
  document.getElementById('cardCounter').style.display = 'flex';
  setMode(mode);
}

// ══════════════════ IRREGULAR VERBS ══════════════════
function renderVerbTable(list) {
  const tbody = document.getElementById('verbsBody');
  tbody.innerHTML = list.map(v =>
    `<tr><td>${v.v1}</td><td>${v.v2}</td><td>${v.v3}</td><td>${v.ru}</td></tr>`
  ).join('');
}

function renderVerbTest(list) {
  verbTestDeck = list;
  const wrap = document.getElementById('verbTestWrap');
  wrap.innerHTML = list.map((v,i) =>
    `<div class="vtest-row">
      <span class="v1">${v.v1}</span>
      <input class="vtest-inp" id="vt2_${i}" placeholder="V2" />
      <input class="vtest-inp" id="vt3_${i}" placeholder="V3" />
      <span class="vtest-fb" id="vtfb_${i}"></span>
    </div>`
  ).join('');
}

function checkVerbTest() {
  let wrong = [];
  verbTestDeck.forEach((v,i) => {
    const v2 = document.getElementById('vt2_'+i).value.trim().toLowerCase();
    const v3 = document.getElementById('vt3_'+i).value.trim().toLowerCase();
    const fb = document.getElementById('vtfb_'+i);
    const inp2 = document.getElementById('vt2_'+i);
    const inp3 = document.getElementById('vt3_'+i);
    const ok2 = v2 === v.v2.toLowerCase();
    const ok3 = v3 === v.v3.toLowerCase().split('/')[0].trim();
    const ok = ok2 && ok3;
    inp2.className = 'vtest-inp '+(ok2?'correct':'wrong');
    inp3.className = 'vtest-inp '+(ok3?'correct':'wrong');
    if (ok) {
      fb.className='vtest-fb c'; fb.textContent='✓';
      verbHardSet.delete(v.v1);
    } else {
      fb.className='vtest-fb w'; fb.textContent='✗ '+v.v2+' / '+v.v3;
      verbHardSet.add(v.v1);
      wrong.push(v);
    }
  });
  saveVerbState(); updateHeroVerbs();
  if (verbMode==='hard' && wrong.length===0) alert('🎉 Все сложные глаголы сданы!');
}

function setVerbMode(m) {
  verbMode = m;
  ['table','test','hard'].forEach(x => document.getElementById('vsub-'+x).classList.toggle('active', x===m));
  document.getElementById('verbTableView').style.display = m==='table' ? '' : 'none';
  document.getElementById('verbTestView').style.display  = m!=='table' ? '' : 'none';

  if (m==='table') {
    renderVerbTable(irregularVerbs);
  } else if (m==='test') {
    renderVerbTest(irregularVerbs);
  } else {
    const hard = irregularVerbs.filter(v => verbHardSet.has(v.v1));
    if (hard.length===0) { alert('Сложных глаголов пока нет — сначала пройди тест!'); setVerbMode('test'); return; }
    renderVerbTest(hard);
  }
  updateHeroVerbs();
}

window.addEventListener('load', async () => {
  await loadWordsFromSupabase();
  loadState();
  renderVerbTable(irregularVerbs);
  setMode('learn');
});
</script>
